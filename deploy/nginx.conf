# /etc/nginx/sites-available/rojoynaranja
# Symlink: ln -s /etc/nginx/sites-available/rojoynaranja /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name rojoynaranja.com www.rojoynaranja.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rojoynaranja.com www.rojoynaranja.com;

    # ── SSL (Let's Encrypt via certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/rojoynaranja.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rojoynaranja.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header X-XSS-Protection       "1; mode=block"          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/rojoynaranja_access.log;
    error_log  /var/log/nginx/rojoynaranja_error.log;

    # ── API → Gunicorn ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        client_max_body_size  10M;
    }

    # ── Static React build ────────────────────────────────────────
    root  /var/www/rojoynaranja/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;
}
